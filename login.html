<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — CKN Coaching Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#090909;--dark:#111;--card:#161616;--border:#252525;--gold:#C4973A;--gold-light:#E2B560;--offwhite:#F0EBE1;--muted:#6A6460;--text:#D8D2C8;--red:#c44a3a}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.7;min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 2rem;border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.12em;color:var(--offwhite);text-decoration:none}
.nav-logo span{color:var(--gold)}
.nav-back{font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s}
.nav-back:hover{color:var(--offwhite)}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem}
.container{width:100%;max-width:420px}
.heading{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:600;color:var(--offwhite);line-height:1.1;margin-bottom:0.5rem}
.heading em{font-style:italic;color:var(--gold)}
.subheading{font-size:0.88rem;color:var(--muted);margin-bottom:2rem;line-height:1.7}
label{display:block;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem;margin-top:1.2rem}
label:first-of-type{margin-top:0}
input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--offwhite);padding:0.85rem 1rem;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:300;outline:none;transition:border-color 0.2s}
input:focus{border-color:var(--gold)}
input::placeholder{color:var(--muted)}
.btn{width:100%;background:var(--gold);color:var(--black);border:none;font-family:'DM Sans',sans-serif;font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;padding:1rem;cursor:pointer;margin-top:1.5rem;transition:background 0.2s}
.btn:hover{background:var(--gold-light)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-outline{background:none;color:var(--muted);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--muted);color:var(--text);background:none}
.error{font-size:0.8rem;color:var(--red);margin-top:0.8rem;display:none}
.error.show{display:block}
.forgot{font-size:0.72rem;color:var(--muted);text-align:right;margin-top:0.5rem;cursor:pointer;text-decoration:underline}
.forgot:hover{color:var(--text)}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--muted);font-size:0.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.spinner{width:1.5rem;height:1.5rem;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;display:none;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">CKN <span>Hub</span></a>
  <a href="index.html" class="nav-back">← Back</a>
</nav>

<div class="page">
  <div class="container">
    <h1 class="heading">Welcome <em>back.</em></h1>
    <p class="subheading">Sign in to access your CKN Coaching Hub dashboard.</p>

    <label>Email Address</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email">

    <label>Password</label>
    <input type="password" id="password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()">

    <div class="forgot" onclick="handleForgot()">Forgot password?</div>

    <div class="error" id="login-error"></div>
    <div class="spinner" id="spinner"></div>

    <button class="btn" id="login-btn" onclick="handleLogin()">Sign In →</button>

    <div class="divider">New here?</div>
    <a href="signup.html"><button class="btn btn-outline" style="margin-top:0">Join the CKN Hub — £9.99/month</button></a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://pvieohrkgekyxwlwyfgb.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_cbLpmXRKSLHCAx5M_0qTmQ_NhIgm00r';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Redirect if already logged in
supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'platform.html';
});

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  const spinner = document.getElementById('spinner');

  errEl.classList.remove('show');
  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    return errEl.classList.add('show');
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  spinner.style.display = 'block';

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    spinner.style.display = 'none';
    btn.disabled = false;
    btn.textContent = 'Sign In →';
    errEl.textContent = error.message === 'Invalid login credentials'
      ? 'Email or password incorrect. Please try again.'
      : error.message;
    errEl.classList.add('show');
    return;
  }

  window.location.href = 'platform.html';
}

async function handleForgot() {
  const email = document.getElementById('email').value.trim();
  if (!email) {
    const errEl = document.getElementById('login-error');
    errEl.textContent = 'Enter your email address above first.';
    errEl.classList.add('show');
    return;
  }
  await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset.html'
  });
  alert('Password reset email sent. Check your inbox.');
}
</script>
</body>
</html>
